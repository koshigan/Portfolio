<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Koshigan is a full-stack developer and IoT engineer building intelligent digital products.">
  <meta name="theme-color" content="#0A0A0F">
  <title>Koshigan | Software Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Force scroll to top before React mounts — fixes Vercel deploy mid-page start -->
  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
    window.scrollTo(0, 0);
  </script>
  <style>
    /* Instant CSS for Pre-mount Loader */
    body {
      background-color: #0A0A0F;
      margin: 0;
      color: #F8F8F8;
      font-family: 'Sora', sans-serif;
    }
    .loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #07070b;
      display: grid;
      place-content: center;
      transition: opacity .6s ease, visibility .6s ease;
    }
    .loader.done {
      opacity: 0;
      visibility: hidden;
    }
    .loader-mark {
      font-weight: 700;
      font-size: 5rem;
      letter-spacing: -.1em;
      text-align: center;
    }
    .loader-mark span {
      color: #06B6D4;
    }
    .loader-line {
      width: 160px;
      height: 1px;
      margin-top: 1rem;
      background: #222;
      overflow: hidden;
    }
    .loader-line i {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, #8B5CF6, #3B82F6, #06B6D4);
      animation: load 1.35s ease forwards;
      transform-origin: left;
    }
    @keyframes load {
      from { transform: scaleX(0) }
      to { transform: scaleX(1) }
    }
  </style>
</head>
<body>
  <!-- Pre-render instant loading screen -->
  <div class="loader" aria-hidden="true">
    <div class="loader-mark">K<span>.</span></div>
    <div class="loader-line"><i></i></div>
  </div>

  <!-- Ambient noise background overlay -->
  <div class="noise" aria-hidden="true"></div>

  <!-- Mount point for React App -->
  <div id="root"></div>
  
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
